name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    # Only the repository owner can summon Claude. This gates the
    # secret-bearing job ahead of the action's own permission check, so
    # untrusted users on this public repo can never start it.
    if: |
      github.actor == 'eoyelana' && (
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

      # claude-code-action exits 0 even when the model call fails (e.g. an
      # expired CLAUDE_CODE_OAUTH_TOKEN), turning the check green while doing
      # nothing. Inspect the execution log and fail the job on is_error instead.
      - name: Fail if Claude did not complete
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude.outputs.execution_file }}
        run: |
          if [ -z "$EXECUTION_FILE" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "No execution file: the action was skipped or did not run. Nothing to verify."
            exit 0
          fi
          errored=$(jq -s '[.. | objects | select(has("is_error")) | .is_error] | any' "$EXECUTION_FILE" 2>/dev/null)
          if [ "$errored" = "true" ]; then
            echo "::error::Claude Code errored (is_error=true) — most likely an expired CLAUDE_CODE_OAUTH_TOKEN. See the step log above; set show_full_output: true for the raw error."
            exit 1
          fi
          echo "Claude Code completed without error."

