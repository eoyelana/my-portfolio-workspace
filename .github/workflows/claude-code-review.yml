name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Only review PRs that originate from this repository (fork PRs receive no
    # secrets), and skip Dependabot PRs — Dependabot-triggered runs cannot read
    # the CLAUDE_CODE_OAUTH_TOKEN secret, so the review can't authenticate.
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    # Supersede an in-flight review when a newer commit is pushed to the PR.
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@af0559ee4f514d1ef21826982bed13f7edc3c35e # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # Read-only gh pr subcommands so the reviewer can inspect the PR
          # without permission denials (a review run logged 14 of them).
          # Deliberately NOT 'gh pr *': no merge/close/comment/review writes —
          # the job token is read-only anyway, this keeps the tool layer least-
          # privilege too.
          claude_args: '--allowed-tools "Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr checks:*),Bash(gh pr list:*),Bash(gh pr status:*)"'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      # claude-code-action exits 0 even when the model call fails (e.g. an
      # expired CLAUDE_CODE_OAUTH_TOKEN), turning the check green with no review
      # posted. Inspect the execution log and fail the job if the terminal
      # result errored. Only type=="result" messages decide: per-tool results
      # also carry is_error (a denied or failed tool call sets it true mid-run)
      # and must not fail an otherwise successful run.
      - name: Fail if the review did not complete
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          if [ -z "$EXECUTION_FILE" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "No execution file: the action was skipped (workflow-validation on a workflow-editing PR) or did not run. Nothing to verify."
            exit 0
          fi
          verdict=$(jq -rs '
            [.. | objects | select(.type? == "result")]
            | if length == 0 then "no-result"
              elif any(.[]; .is_error == true) then "errored"
              else "ok" end' "$EXECUTION_FILE" 2>/dev/null)
          case "$verdict" in
            ok)        echo "Claude Code review completed without error." ;;
            no-result) echo "::error::No terminal result message in the execution log — Claude Code died before finishing (auth or API failure?). Set show_full_output: true for the raw error."; exit 1 ;;
            errored)   echo "::error::Claude Code ended with is_error=true and posted no review — check CLAUDE_CODE_OAUTH_TOKEN validity and the step log above."; exit 1 ;;
            *)         echo "::error::Could not parse the execution log (jq failed) — refusing to pass silently."; exit 1 ;;
          esac

