name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: Only run on specific file changes
    # paths:
    #   - "src/**/*.ts"
    #   - "src/**/*.tsx"
    #   - "src/**/*.js"
    #   - "src/**/*.jsx"

jobs:
  claude-review:
    # Only review PRs that originate from this repository (fork PRs receive no
    # secrets), and skip Dependabot PRs — Dependabot-triggered runs cannot read
    # the CLAUDE_CODE_OAUTH_TOKEN secret, so the review can't authenticate.
    if: github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]'
    # Supersede an in-flight review when a newer commit is pushed to the PR.
    concurrency:
      group: claude-review-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@e90deca47693f9457b72f2b53c17d7c445a87342 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

      # claude-code-action exits 0 even when the model call fails (e.g. an
      # expired CLAUDE_CODE_OAUTH_TOKEN), turning the check green with no review
      # posted. Inspect the execution log and fail the job on is_error instead.
      - name: Fail if the review did not complete
        if: always()
        env:
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          if [ -z "$EXECUTION_FILE" ] || [ ! -f "$EXECUTION_FILE" ]; then
            echo "No execution file: the action was skipped (workflow-validation on a workflow-editing PR) or did not run. Nothing to verify."
            exit 0
          fi
          errored=$(jq -s '[.. | objects | select(has("is_error")) | .is_error] | any' "$EXECUTION_FILE" 2>/dev/null)
          if [ "$errored" = "true" ]; then
            echo "::error::Claude Code errored (is_error=true) and posted no review — most likely an expired CLAUDE_CODE_OAUTH_TOKEN. See the step log above; set show_full_output: true for the raw error."
            exit 1
          fi
          echo "Claude Code review completed without error."

